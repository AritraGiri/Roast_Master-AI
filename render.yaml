services:
  # 🤖 1. The Python/Flask Backend
  - type: web
    name: roast-master-backend
    runtime: python
    plan: free # Keep this here! Python web services need to specify the free plan.
    rootDir: roast-master-backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app

  # 🌐 2. The Static Web Frontend
  - type: web
    name: roast-master-frontend
    runtime: static
    # ❌ (Removed the 'plan: free' line from here)
    rootDir: roast-master-frontend
    buildCommand: "" 
    staticPublishPath: "."
